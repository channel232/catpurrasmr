name: Render
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_work: ${{ steps.discover.outputs.has_work }}
    steps:
      - name: Install gdown
        run: pip install gdown --break-system-packages

      - name: Discover
        id: discover
        run: |
          python3 << 'EOF'
          import json, os, sys, time
          from pathlib import Path
          import gdown

          CATS_FOLDER = "1suKDbdX6DQcC76T3Xc0n6mJeZ9i_t7CH"
          TMP_DIR = Path("/tmp/discover_catvids")
          TMP_DIR.mkdir(parents=True, exist_ok=True)

          for attempt in range(3):
              try:
                  gdown.download_folder(id=CATS_FOLDER, output=str(TMP_DIR), quiet=False, use_cookies=False)
                  break
              except Exception as e:
                  print(f"Attempt {attempt+1} failed: {e}")
                  if attempt == 2:
                      sys.exit(1)
                  time.sleep(30)

          videos = sorted(
              list(TMP_DIR.glob("*.mp4")) +
              list(TMP_DIR.glob("*.mov")) +
              list(TMP_DIR.glob("*.avi")) +
              list(TMP_DIR.glob("*.mkv"))
          )

          if not videos:
              sys.exit(1)

          indices = list(range(len(videos)))
          matrix = json.dumps({"video_index": indices})

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix}\n")
              f.write("has_work=true\n")
          EOF

  render:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        video_index: ${{ fromJson(needs.discover.outputs.matrix).video_index }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          docker system prune -af || true
          df -h

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg --fix-missing
          pip install gdown --break-system-packages

      - name: Run
        id: render
        env:
          VIDEO_INDEX: ${{ matrix.video_index }}
        run: python rndr.py

      - name: Tag and Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INDEX=${{ matrix.video_index }}
          VIDEO=$(ls /tmp/catvids/OUT_${INDEX}_*.mp4 2>/dev/null | head -n 1)

          if [ -z "$VIDEO" ]; then
            echo "No output video found, skipping release."
            exit 0
          fi

          TS=$(date -u +"%Y%m%d_%H%M%S")
          STEM=$(basename "$VIDEO" .mp4)
          TAG="r_${STEM}_${TS}"
          VID_NAME=$(basename "$VIDEO")

          gh release create "$TAG" "$VIDEO" \
            --title "${{ steps.render.outputs.final_size_mb }} MB" \
            --notes "Job ${INDEX} — ${VID_NAME}" \
            --repo ${{ github.repository }}
