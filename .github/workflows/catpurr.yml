name: Render Catvids
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg --fix-missing
          pip install gdown --break-system-packages
      - name: Run render
        run: python render.py
      - name: Upload video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: catvids-${{ github.run_number }}
          path: /tmp/catvids/OUT_*.mp4
          retention-days: 1
