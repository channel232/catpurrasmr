name: Render CatPurrASMR
on:
  workflow_dispatch:
jobs:
  count_videos:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Install deps
        run: pip install gdown --break-system-packages
      - name: Count videos in Drive
        id: set_matrix
        run: |
          python3 << 'EOF'
          import gdown
          import json
          from pathlib import Path

          CATS_FOLDER = "1suKDbdX6DQcC76T3Xc0n6mJeZ9i_t7CH"
          tmp = Path("/tmp/count")
          tmp.mkdir(exist_ok=True)

          gdown.download_folder(id=CATS_FOLDER, output=str(tmp), quiet=False, use_cookies=False)

          videos = sorted(
              list(tmp.glob("*.mp4")) +
              list(tmp.glob("*.mov")) +
              list(tmp.glob("*.avi")) +
              list(tmp.glob("*.mkv"))
          )

          count = len(videos)
          print(f"Found {count} videos")

          indices = list(range(count))
          matrix = json.dumps({"video_index": indices})

          with open("/tmp/matrix.json", "w") as f:
              f.write(matrix)

          import subprocess
          subprocess.run(["bash", "-c", f'echo "matrix={matrix}" >> $GITHUB_OUTPUT'])
          EOF

  render:
    needs: count_videos
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix: ${{ fromJson(needs.count_videos.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg --fix-missing
          pip install gdown --break-system-packages
      - name: Run render
        env:
          VIDEO_INDEX: ${{ matrix.video_index }}
        run: python render.py
      - name: Show video used in summary
        if: always()
        run: |
          INDEX=${{ matrix.video_index }}
          NAME_FILE="/tmp/catvids/video_name_${INDEX}.txt"
          ID_FILE="/tmp/catvids/video_id_${INDEX}.txt"
          FOLDER_ID="1suKDbdX6DQcC76T3Xc0n6mJeZ9i_t7CH"
          if [ -f "$NAME_FILE" ]; then
            VID_NAME=$(cat "$NAME_FILE")
            echo "## 🐱 Job ${INDEX} — Video Used" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Filename:** \`${VID_NAME}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -f "$ID_FILE" ]; then
              FILE_ID=$(cat "$ID_FILE")
              echo "[![video preview](https://drive.google.com/thumbnail?id=${FILE_ID}&sz=w400)](https://drive.google.com/file/d/${FILE_ID}/view)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            echo "> Delete **\`${VID_NAME}\`** from your [Google Drive cats folder](https://drive.google.com/drive/folders/${FOLDER_ID}) after downloading." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⏭️ Job ${INDEX} — skipped" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload video as Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VIDEO=$(ls /tmp/catvids/OUT_${{ matrix.video_index }}_*.mp4 2>/dev/null | head -n 1)
          if [ -z "$VIDEO" ]; then exit 0; fi
          TAG="run-${{ github.run_number }}-job-${{ matrix.video_index }}"
          gh release create "$TAG" "$VIDEO" \
            --title "CatPurrASMR Run ${{ github.run_number }} — Job ${{ matrix.video_index }}" \
            --notes "Auto-generated render" \
            --repo ${{ github.repository }}
